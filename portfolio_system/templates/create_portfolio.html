{% extends "base.html" %}
{% block title %}Create Portfolio{% endblock %}
{% block content %}
<h1>Create Portfolio</h1>
<div class="card" style="max-width:450px">
    <h2>New Portfolio</h2>
    <form method="POST" action="{{ url_for('create_portfolio') }}">
        <div class="form-group">
            <label for="portfolio_name">Portfolio Name</label>
            <input type="text" id="portfolio_name" name="portfolio_name"
                   required placeholder="e.g. My Long-Term Investments">
        </div>
        <div class="form-group">
            <label for="base_currency">Base Currency</label>
            <select id="base_currency" name="base_currency">
                <option value="USD">USD — US Dollar</option>
                <option value="INR">INR — Indian Rupee</option>
                <option value="EUR">EUR — Euro</option>
                <option value="GBP">GBP — British Pound</option>
            </select>
        </div>
        <button type="submit" class="btn btn-success">Create Portfolio</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-primary" style="margin-left:8px">Cancel</a>
    </form>
</div>
{% endblock %}
